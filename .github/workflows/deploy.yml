name: Deploy to Render

on:
  workflow_run:
    workflows: ["Testing"]
    types: [completed]
    branches: ["main"]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deployment
        run: |
          curl --fail-with-body -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"


          